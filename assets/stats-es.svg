<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 132" width="1000" height="132" role="img" aria-label="Profile metrics">
    <style>
      .card{opacity:0;animation:up .7s ease forwards;}
      @keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
      .scan{animation:scan 3s linear infinite;}
      @keyframes scan{0%{opacity:0;}10%{opacity:.8;}100%{opacity:0;transform:translateX(140px);}}
      text{font-family:'Cascadia Code','Consolas',ui-monospace,monospace;}
    </style>
    <rect width="1000" height="132" fill="#040d18"/><g class="card" style="animation-delay:0.00s"><rect x="28.0" y="20" width="224.0" height="92" rx="12" fill="#081a2c" stroke="#123a55" stroke-width="1.3"/><rect x="28.0" y="20" width="4" height="92" rx="2" fill="#2dd4bf"/><text x="50.0" y="74" fill="#e2f1f8" font-size="34" font-weight="700">7</text><text x="50.0" y="98" fill="#6f97b0" font-size="12" letter-spacing="1.5">REPOSITORIOS</text><rect x="34.0" y="22" width="2" height="88" fill="#2dd4bf" class="scan" style="animation-delay:0.00s"/></g><g class="card" style="animation-delay:0.15s"><rect x="268.0" y="20" width="224.0" height="92" rx="12" fill="#081a2c" stroke="#123a55" stroke-width="1.3"/><rect x="268.0" y="20" width="4" height="92" rx="2" fill="#2dd4bf"/><text x="290.0" y="74" fill="#e2f1f8" font-size="34" font-weight="700">0</text><text x="290.0" y="98" fill="#6f97b0" font-size="12" letter-spacing="1.5">ESTRELLAS</text><rect x="274.0" y="22" width="2" height="88" fill="#2dd4bf" class="scan" style="animation-delay:0.40s"/></g><g class="card" style="animation-delay:0.30s"><rect x="508.0" y="20" width="224.0" height="92" rx="12" fill="#081a2c" stroke="#123a55" stroke-width="1.3"/><rect x="508.0" y="20" width="4" height="92" rx="2" fill="#2dd4bf"/><text x="530.0" y="74" fill="#e2f1f8" font-size="34" font-weight="700">12</text><text x="530.0" y="98" fill="#6f97b0" font-size="12" letter-spacing="1.5">LENGUAJES</text><rect x="514.0" y="22" width="2" height="88" fill="#2dd4bf" class="scan" style="animation-delay:0.80s"/></g><g class="card" style="animation-delay:0.45s"><rect x="748.0" y="20" width="224.0" height="92" rx="12" fill="#081a2c" stroke="#123a55" stroke-width="1.3"/><rect x="748.0" y="20" width="4" height="92" rx="2" fill="#2dd4bf"/><text x="770.0" y="74" fill="#e2f1f8" font-size="34" font-weight="700">2023</text><text x="770.0" y="98" fill="#6f97b0" font-size="12" letter-spacing="1.5">DESDE</text><rect x="754.0" y="22" width="2" height="88" fill="#2dd4bf" class="scan" style="animation-delay:1.20s"/></g></svg>