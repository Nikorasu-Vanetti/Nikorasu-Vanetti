<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 340" width="1000" height="340" role="img" aria-label="Jose Nicolas Sanchez Zorrilla - Software Engineer  //  developer tools &amp; IDEs"><defs><radialGradient id="bg" cx="50%" cy="38%" r="85%"><stop offset="0%" stop-color="#161a40"/><stop offset="45%" stop-color="#0b1230"/><stop offset="100%" stop-color="#05030f"/></radialGradient><linearGradient id="ng" gradientUnits="userSpaceOnUse" x1="60" y1="0" x2="380" y2="0" spreadMethod="repeat"><stop offset="0" stop-color="#22d3ee"/><stop offset="0.17" stop-color="#60a5fa"/><stop offset="0.34" stop-color="#a855f7"/><stop offset="0.5" stop-color="#f472b6"/><stop offset="0.67" stop-color="#fb7185"/><stop offset="0.84" stop-color="#fbbf24"/><stop offset="1" stop-color="#22d3ee"/><animateTransform attributeName="gradientTransform" type="translate" values="0 0; 320 0" dur="7s" repeatCount="indefinite"/></linearGradient><linearGradient id="pins" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#22d3ee"/><stop offset="0.5" stop-color="#a855f7"/><stop offset="1" stop-color="#f472b6"/></linearGradient><filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="soft"><feGaussianBlur stdDeviation="26"/></filter><pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse"><path d="M34 0H0V34" fill="none" stroke="#1b2350" stroke-width="1"/></pattern><linearGradient id="scrim" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#05030f" stop-opacity="0.86"/><stop offset="0.42" stop-color="#05030f" stop-opacity="0.6"/><stop offset="0.72" stop-color="#05030f" stop-opacity="0"/></linearGradient></defs><style>
      .draw{stroke-dasharray:1400;stroke-dashoffset:1400;animation:draw 2.4s ease forwards;}
      .flow{stroke-dasharray:5 26;animation:flow 1.5s linear infinite;}
      @keyframes draw{to{stroke-dashoffset:0;}}
      @keyframes flow{to{stroke-dashoffset:-310;}}
      .via{animation:pulse 2.6s ease-in-out infinite;transform-origin:center;}
      @keyframes pulse{0%,100%{opacity:.5;r:3;}50%{opacity:1;r:5.5;}}
      .led{animation:blink 1.5s steps(1) infinite;}
      @keyframes blink{0%,55%{opacity:1;}56%,100%{opacity:.2;}}
      .pin{animation:sweep 2.4s ease-in-out infinite;}
      @keyframes sweep{0%,100%{opacity:.3;}50%{opacity:1;}}
      .aur{animation:drift 9s ease-in-out infinite;}
      @keyframes drift{0%,100%{transform:translate(0,0);}50%{transform:translate(40px,18px);}}
      .aur2{animation:drift2 11s ease-in-out infinite;}
      @keyframes drift2{0%,100%{transform:translate(0,0);}50%{transform:translate(-46px,-14px);}}
      .fade{opacity:0;animation:fade 1s ease .2s forwards;}
      .fade2{opacity:0;animation:fade 1s ease .7s forwards;}
      @keyframes fade{to{opacity:1;}}
      .name{opacity:0;animation:fade 1s ease .2s forwards, shine 3s ease-in-out 1.4s infinite;}
      @keyframes shine{0%,100%{filter:drop-shadow(0 0 6px rgba(96,165,250,.5));}50%{filter:drop-shadow(0 0 16px rgba(244,114,182,.7));}}
      .role{opacity:0;animation:role 9s ease-in-out infinite;}
      @keyframes role{0%{opacity:0;transform:translateY(6px);}3%{opacity:1;transform:translateY(0);}28%{opacity:1;}33%,100%{opacity:0;}}
      .cur{animation:cur 1s steps(1) infinite;}
      @keyframes cur{0%,49%{opacity:1;}50%,100%{opacity:0;}}
      text{font-family:'Segoe UI',Helvetica,Arial,sans-serif;}
      .mono{font-family:'Cascadia Code','Consolas',ui-monospace,monospace;}
