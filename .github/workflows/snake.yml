name: Generate snake

on:
  schedule:
    - cron: "23 5 * * *"   # diario, 05:23 UTC
  push:
    branches: [main]
    paths-ignore:
      - "assets/**"
      - "README*.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: snake
  cancel-in-progress: true

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - name: Generate contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake-dark.svg?palette=github-dark&color_snake=#f472b6&color_dots=#0b1230,#3b1f8f,#a855f7,#22d3ee,#fbbf24

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
